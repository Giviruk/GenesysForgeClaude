services:
  postgres:
    image: postgres:17-alpine
    container_name: genesysforge-db
    environment:
      POSTGRES_USER: genesys
      POSTGRES_PASSWORD: genesys_dev
      POSTGRES_DB: genesysforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
