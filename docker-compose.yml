# Полный стек одной командой: docker compose up -d --build
# Конфигурация — через .env (см. .env.example); значения по умолчанию подходят для локальной разработки.
services:
  postgres:
    image: postgres:17-alpine
    container_name: genesysforge-db
    environment:
      POSTGRES_USER: genesys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genesys_dev}
      POSTGRES_DB: genesysforge
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesys -d genesysforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: genesysforge-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${API_ENVIRONMENT:-Production}
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=genesysforge;Username=genesys;Password=${POSTGRES_PASSWORD:-genesys_dev}"
      Jwt__Key: ${JWT_KEY:-genesysforge-dev-signing-key-change-in-production!}
      # Время жизни access-токена в минутах (короткое — сессия продлевается refresh-токеном). По умолчанию 30.
      Jwt__AccessLifetimeMinutes: ${JWT_ACCESS_LIFETIME_MINUTES:-30}
      # Базовый адрес сайта для ссылок в письмах (сброс пароля).
      App__BaseUrl: ${APP_BASE_URL:-http://localhost:8080}
      # Google OAuth (опционально). Пусто — вход через Google выключен (кнопка скрыта).
      Auth__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./frontend
    container_name: genesysforge-web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
