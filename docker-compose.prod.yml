# Продакшен-стек для VPS: готовые образы из GHCR + Caddy (авто-HTTPS).
# Наружу публикуется ТОЛЬКО Caddy (80/443); api/web/postgres — во внутренней сети.
# Конфигурация приходит из .env, который deploy-workflow пишет на сервере из GitHub Secrets/Variables.
# Запуск на VPS: docker compose -f docker-compose.prod.yml up -d
services:
  postgres:
    image: postgres:17-alpine
    container_name: genesysforge-db
    environment:
      POSTGRES_USER: genesys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: genesysforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesys -d genesysforge"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m

  postgres-public:
    image: postgres:17-alpine
    container_name: genesysforge-db-public
    environment:
      POSTGRES_USER: genesys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: genesysforge_public
    volumes:
      - pgdata_public:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesys -d genesysforge_public"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m

  api:
    image: ghcr.io/${GHCR_OWNER}/genesysforge-api:latest
    container_name: genesysforge-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Workstation GC заметно снижает потребление памяти .NET в маленьком контейнере
      DOTNET_gcServer: "0"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=genesysforge;Username=genesys;Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__AccessLifetimeMinutes: ${JWT_ACCESS_LIFETIME_MINUTES:-30}
      RateLimiting__AuthSensitive__PermitLimit: ${AUTH_SENSITIVE_PERMIT_LIMIT:-10}
      RateLimiting__AuthSensitive__WindowSeconds: ${AUTH_RATE_WINDOW_SECONDS:-60}
      RateLimiting__AuthSession__PermitLimit: ${AUTH_SESSION_PERMIT_LIMIT:-30}
      RateLimiting__AuthSession__WindowSeconds: ${AUTH_RATE_WINDOW_SECONDS:-60}
      RateLimiting__AuthPublic__PermitLimit: ${AUTH_PUBLIC_PERMIT_LIMIT:-60}
      RateLimiting__AuthPublic__WindowSeconds: ${AUTH_RATE_WINDOW_SECONDS:-60}
      Content__Mode: PrivateFull
      Cors__Origins: "https://${PRIVATE_HOSTNAME}"
      # Google OAuth (опционально). Пусто — вход через Google выключен (кнопка скрыта).
      Auth__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      App__BaseUrl: "https://${PRIVATE_HOSTNAME}"
      # Email-провайдер для писем сброса пароля. По умолчанию Logging (ссылка пишется в лог API).
      # Реальная отправка: EMAIL_PROVIDER=Smtp + параметры SMTP-relay (см. .env.example).
      Email__Provider: ${EMAIL_PROVIDER:-Logging}
      Email__From: ${EMAIL_FROM:-no-reply@${PRIVATE_HOSTNAME}}
      Email__FromName: ${EMAIL_FROM_NAME:-GenesysForge}
      Email__Smtp__Host: ${EMAIL_SMTP_HOST:-}
      Email__Smtp__Port: ${EMAIL_SMTP_PORT:-587}
      Email__Smtp__Username: ${EMAIL_SMTP_USERNAME:-}
      Email__Smtp__Password: ${EMAIL_SMTP_PASSWORD:-}
      Email__Smtp__UseStartTls: ${EMAIL_SMTP_USE_STARTTLS:-true}
      # Хранилище картинок (аватары, портреты). None — загрузка выключена.
      # Бакет общий с другими проектами: каждый стек пишет строго под своим префиксом.
      Storage__Provider: ${STORAGE_PROVIDER:-None}
      Storage__S3__ServiceUrl: ${S3_SERVICE_URL:-}
      Storage__S3__Bucket: ${S3_BUCKET:-}
      Storage__S3__AccessKey: ${S3_ACCESS_KEY:-}
      Storage__S3__SecretKey: ${S3_SECRET_KEY:-}
      Storage__S3__Region: ${S3_REGION:-ru1}
      Storage__S3__Prefix: genesysforge/uploads/private
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 320m

  api-public:
    image: ghcr.io/${GHCR_OWNER}/genesysforge-api-public:latest
    container_name: genesysforge-api-public
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_gcServer: "0"
      ConnectionStrings__Default: "Host=postgres-public;Port=5432;Database=genesysforge_public;Username=genesys;Password=${POSTGRES_PASSWORD}"
      # Separate signing key namespace: private access tokens are invalid in the public stack.
      Jwt__Key: "${JWT_KEY}-public"
      Jwt__AccessLifetimeMinutes: ${JWT_ACCESS_LIFETIME_MINUTES:-30}
      RateLimiting__AuthSensitive__PermitLimit: ${AUTH_SENSITIVE_PERMIT_LIMIT:-10}
      RateLimiting__AuthSensitive__WindowSeconds: ${AUTH_RATE_WINDOW_SECONDS:-60}
      RateLimiting__AuthSession__PermitLimit: ${AUTH_SESSION_PERMIT_LIMIT:-30}
      RateLimiting__AuthSession__WindowSeconds: ${AUTH_RATE_WINDOW_SECONDS:-60}
      RateLimiting__AuthPublic__PermitLimit: ${AUTH_PUBLIC_PERMIT_LIMIT:-60}
      RateLimiting__AuthPublic__WindowSeconds: ${AUTH_RATE_WINDOW_SECONDS:-60}
      Content__Mode: PublicSafe
      Cors__Origins: "https://${PUBLIC_HOSTNAME:-public-disabled.localhost}"
      Auth__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      App__BaseUrl: "https://${PUBLIC_HOSTNAME:-public-disabled.localhost}"
      Email__Provider: ${EMAIL_PROVIDER:-Logging}
      Email__From: ${EMAIL_FROM:-no-reply@${PUBLIC_HOSTNAME:-public-disabled.localhost}}
      Email__FromName: ${EMAIL_FROM_NAME:-GenesysForge}
      Email__Smtp__Host: ${EMAIL_SMTP_HOST:-}
      Email__Smtp__Port: ${EMAIL_SMTP_PORT:-587}
      Email__Smtp__Username: ${EMAIL_SMTP_USERNAME:-}
      Email__Smtp__Password: ${EMAIL_SMTP_PASSWORD:-}
      Email__Smtp__UseStartTls: ${EMAIL_SMTP_USE_STARTTLS:-true}
      # Хранилище картинок: тот же бакет, но свой префикс — стеки не пересекаются.
      Storage__Provider: ${STORAGE_PROVIDER:-None}
      Storage__S3__ServiceUrl: ${S3_SERVICE_URL:-}
      Storage__S3__Bucket: ${S3_BUCKET:-}
      Storage__S3__AccessKey: ${S3_ACCESS_KEY:-}
      Storage__S3__SecretKey: ${S3_SECRET_KEY:-}
      Storage__S3__Region: ${S3_REGION:-ru1}
      Storage__S3__Prefix: genesysforge/uploads/public
    depends_on:
      postgres-public:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 320m

  web:
    image: ghcr.io/${GHCR_OWNER}/genesysforge-web:latest
    container_name: genesysforge-web
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 64m

  web-public:
    image: ghcr.io/${GHCR_OWNER}/genesysforge-web:latest
    container_name: genesysforge-web-public
    environment:
      API_UPSTREAM: api-public
    depends_on:
      - api-public
    restart: unless-stopped
    mem_limit: 64m

  backup:
    image: postgres:17-alpine
    container_name: genesysforge-backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    command:
      - /bin/sh
      - -ec
      - |
        while true; do
          timestamp="$$(date -u +%Y%m%dT%H%M%SZ)"
          pg_dump -h postgres -U genesys -d genesysforge -Fc -f "/backups/private-$${timestamp}.dump"
          pg_dump -h postgres-public -U genesys -d genesysforge_public -Fc -f "/backups/public-$${timestamp}.dump"
          find /backups -type f -name '*.dump' -mtime "+$${BACKUP_RETENTION_DAYS}" -delete
          sleep 86400
        done
    volumes:
      - pgbackups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      postgres-public:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m

  caddy:
    image: caddy:2-alpine
    container_name: genesysforge-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      PRIVATE_HOSTNAME: ${PRIVATE_HOSTNAME}
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-public-disabled.localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Cloudflare Origin cert/key — записывается deploy-workflow'ом из GitHub Secrets
      - ./deploy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - web-public
    restart: unless-stopped
    mem_limit: 64m

volumes:
  pgdata:
  pgdata_public:
  pgbackups:
  caddy_data:
  caddy_config:
