name: Deploy

# Запускается после успешного прогона CI на master, либо вручную (workflow_dispatch).
# Собирает образы api/web, публикует в GHCR и разворачивает стек на VPS по SSH.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build images and deploy to VPS
    runs-on: ubuntu-latest
    # для workflow_run — только если CI завершился успехом; для ручного запуска — всегда
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Compute lowercase GHCR owner
        id: ghcr
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Для сборки/публикации в Actions используем встроенный GITHUB_TOKEN
      # (у job есть packages:write) — не зависим от scope личного GHCR_TOKEN.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: private
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/genesysforge-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push PublicSafe API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: public
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/genesysforge-api-public:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/genesysforge-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: mkdir -p "${{ vars.DEPLOY_PATH }}/deploy"

      - name: Copy compose and Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yml,deploy/Caddyfile,deploy/backup-now.sh,deploy/restore.sh,deploy/rollback.sh"
          target: ${{ vars.DEPLOY_PATH }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          # Cloudflare Origin Certificate (режим SSL Full strict) — PEM cert и private key
          CADDY_ORIGIN_CERT: ${{ secrets.CADDY_ORIGIN_CERT }}
          CADDY_ORIGIN_KEY: ${{ secrets.CADDY_ORIGIN_KEY }}
          # S3-хранилище картинок (Beget Cloud Storage). Пустой STORAGE_PROVIDER — загрузка выключена.
          STORAGE_PROVIDER: ${{ vars.STORAGE_PROVIDER }}
          S3_SERVICE_URL: ${{ vars.S3_SERVICE_URL }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_REGION: ${{ vars.S3_REGION }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          # Отдельный бакет/ключ для оффсайт-бэкапов БД: у API-контейнеров доступа к нему нет.
          BACKUP_S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
          BACKUP_S3_ACCESS_KEY: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          BACKUP_S3_SECRET_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
          PRIVATE_HOSTNAME: ${{ vars.PRIVATE_HOSTNAME }}
          PUBLIC_HOSTNAME: ${{ vars.PUBLIC_HOSTNAME }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          # Google OAuth client id — публичный (уходит в браузер), потому Variable, а не Secret. Пусто — кнопка скрыта.
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          JWT_ACCESS_LIFETIME_MINUTES: ${{ vars.JWT_ACCESS_LIFETIME_MINUTES }}
          BACKUP_RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS }}
          AUTH_SENSITIVE_PERMIT_LIMIT: ${{ vars.AUTH_SENSITIVE_PERMIT_LIMIT }}
          AUTH_SESSION_PERMIT_LIMIT: ${{ vars.AUTH_SESSION_PERMIT_LIMIT }}
          AUTH_PUBLIC_PERMIT_LIMIT: ${{ vars.AUTH_PUBLIC_PERMIT_LIMIT }}
          AUTH_RATE_WINDOW_SECONDS: ${{ vars.AUTH_RATE_WINDOW_SECONDS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GHCR_OWNER,GHCR_USERNAME,GHCR_TOKEN,POSTGRES_PASSWORD,JWT_KEY,CADDY_ORIGIN_CERT,CADDY_ORIGIN_KEY,STORAGE_PROVIDER,S3_SERVICE_URL,S3_BUCKET,S3_REGION,S3_ACCESS_KEY,S3_SECRET_KEY,BACKUP_S3_BUCKET,BACKUP_S3_ACCESS_KEY,BACKUP_S3_SECRET_KEY,PRIVATE_HOSTNAME,PUBLIC_HOSTNAME,DEPLOY_PATH,GOOGLE_CLIENT_ID,JWT_ACCESS_LIFETIME_MINUTES,BACKUP_RETENTION_DAYS,AUTH_SENSITIVE_PERMIT_LIMIT,AUTH_SESSION_PERMIT_LIMIT,AUTH_PUBLIC_PERMIT_LIMIT,AUTH_RATE_WINDOW_SECONDS
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH}"

            # Swap на случай пиков памяти при первом старте (best-effort, не валим деплой)
            if ! swapon --show 2>/dev/null | grep -q '/swapfile'; then
              ( sudo fallocate -l 2G /swapfile \
                && sudo chmod 600 /swapfile \
                && sudo mkswap /swapfile \
                && sudo swapon /swapfile ) || echo "swap setup skipped (no sudo or already configured)"
            fi

            # .env для compose (значения не попадают в логи — секреты маскируются)
            umask 077
            cat > .env <<EOF
            GHCR_OWNER=${GHCR_OWNER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_KEY=${JWT_KEY}
            PRIVATE_HOSTNAME=${PRIVATE_HOSTNAME}
            PUBLIC_HOSTNAME=${PUBLIC_HOSTNAME:-public-disabled.localhost}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            JWT_ACCESS_LIFETIME_MINUTES=${JWT_ACCESS_LIFETIME_MINUTES:-30}
            BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
            AUTH_SENSITIVE_PERMIT_LIMIT=${AUTH_SENSITIVE_PERMIT_LIMIT:-10}
            AUTH_SESSION_PERMIT_LIMIT=${AUTH_SESSION_PERMIT_LIMIT:-30}
            AUTH_PUBLIC_PERMIT_LIMIT=${AUTH_PUBLIC_PERMIT_LIMIT:-60}
            AUTH_RATE_WINDOW_SECONDS=${AUTH_RATE_WINDOW_SECONDS:-60}
            STORAGE_PROVIDER=${STORAGE_PROVIDER:-None}
            S3_SERVICE_URL=${S3_SERVICE_URL}
            S3_BUCKET=${S3_BUCKET}
            S3_REGION=${S3_REGION:-ru1}
            S3_ACCESS_KEY=${S3_ACCESS_KEY}
            S3_SECRET_KEY=${S3_SECRET_KEY}
            BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET}
            BACKUP_S3_ACCESS_KEY=${BACKUP_S3_ACCESS_KEY}
            BACKUP_S3_SECRET_KEY=${BACKUP_S3_SECRET_KEY}
            EOF

            # Cloudflare Origin cert/key для Caddy (Full strict). Пишем из secrets, не логируем.
            mkdir -p deploy/certs
            printf '%s\n' "${CADDY_ORIGIN_CERT}" > deploy/certs/origin.crt
            printf '%s\n' "${CADDY_ORIGIN_KEY}" > deploy/certs/origin.key
            chmod 600 deploy/certs/origin.key deploy/certs/origin.crt

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af
            docker logout ghcr.io
