name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Verify PublicSafe publish excludes private resources
        run: >-
          dotnet publish src/GenesysForge.Api/GenesysForge.Api.csproj
          --configuration Release --no-restore
          --output public-safe-publish
          /p:IncludePrivateContent=false

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for full stack
        run: |
          for i in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8080/api/auth/providers > /dev/null; then
              echo "Full stack is ready"
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color --tail=200
          exit 1

      - name: Run E2E smoke tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npm run test:e2e

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Stop full stack
        if: always()
        run: docker compose down -v
